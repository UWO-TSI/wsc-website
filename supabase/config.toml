# Supabase CLI config — used for `supabase link` and `supabase db push`
# Reference: https://supabase.com/docs/guides/local-development/cli/config#api-config

project_id = "wsc-cms"

# API (PostgREST) — https://supabase.com/docs/guides/local-development/cli/config#api-config
[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323
